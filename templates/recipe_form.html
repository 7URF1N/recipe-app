{% extends "base.html" %}
{% block content %}
<h2>{% if recipe %}Muokkaa reseptiä{% else %}Uusi resepti{% endif %}</h2>
<form method="post" style="max-width:600px">
  <label>Nimi</label>
  <input type="text" name="name" value="{{ recipe['name'] if recipe else '' }}" required>
  <label>Kategoria</label>
  <select name="category">
    {% for c in categories %}
      <option value="{{ c }}" {% if recipe and recipe['category']==c %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>
  <label>Ainesosat</label>
  <textarea name="ingredients" rows="4" required>{{ recipe['ingredients'] if recipe else '' }}</textarea>
  <label>Valmistusohjeet</label>
  <textarea name="instructions" rows="5" required>{{ recipe['instructions'] if recipe else '' }}</textarea>
  <button type="submit">Tallenna</button>
  <a href="{{ url_for('items.index') }}" class="btn btn-secondary">Peruuta</a>
</form>
{% endblock %}

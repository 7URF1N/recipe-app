{% extends "layout.html" %}

{% block content %}
<h1>Edit recipe</h1>

<form action="/update_recipe" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <input type="hidden" name="recipe_id" value="{{ recipe.id }}">

    <p>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"
               value="{{ recipe.name }}" maxlength="100" required>
    </p>

    <p>
        <label for="ingredients">Ingredients:</label><br>
        <textarea id="ingredients" name="ingredients"
                  rows="6" cols="40" maxlength="5000" required>{{ recipe.ingredients }}</textarea>
    </p>

    <p>
        <label for="instructions">Instructions:</label><br>
        <textarea id="instructions" name="instructions"
                  rows="10" cols="40" maxlength="10000" required>{{ recipe.instructions }}</textarea>
    </p>

    <fieldset class="classes">
        <legend>Categories</legend>
        <p class="hint">You can select one or more categories.</p>
        {% for title, values in classes.items() %}
        <div class="class-group">
            <strong>{{ title }}</strong><br>
            {% for value in values %}
                <label class="checkbox">
                    <input type="checkbox"
                           name="classes_{{ title }}"
                           value="{{ value }}"
                           {% if selected.get(title) and value in selected[title] %}checked{% endif %}>
                    {{ value }}
                </label>
            {% endfor %}
        </div>
        {% endfor %}
    </fieldset>

    <p class="actions">
        <input class="btn" type="submit" value="Save">
        <a class="btn btn-secondary" href="/recipe/{{ recipe.id }}">Cancel</a>
    </p>
</form>
{% endblock %}
